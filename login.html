<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Login-form</title>

   <link rel="stylesheet" href="login.css">
   <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
   <script type="text/javascript" src="login.js" defer></script>  <!-- HTML loads first, JS runs after the page is fully built -->
</head>
<body>
   <div class="container">
      <div class="form-box">

         <div class="header">
            <h1 class="game">Valorant</h1>
            <h1 class="sign-in">Sign In</h1>
         </div>

         <form action="" id="form">
            <span class="logo">
               <img src="images/riot.png" />
               <h1> Riot Games</h1>
            </span>

            <div class="wrapper">

               <div class="input-box">
                  <label for="user">
                     <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  fill="#ffffff" viewBox="0 0 24 24" >
                        <path d="M12 2a5 5 0 1 0 0 10 5 5 0 1 0 0-10M4 22h16c.55 0 1-.45 1-1v-1c0-3.86-3.14-7-7-7h-4c-3.86 0-7 3.14-7 7v1c0 .55.45 1 1 1"></path>
                     </svg>
                  </label>
                  <input type="text" id="userinput" placeholder="Enter Username" required>
               </div>

                <div class="input-box">
                  <label for="email">
                     <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="#ffffff" viewBox="0 0 24 24" >
                        <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2m-8.61 10.79c.18.14.4.21.61.21s.43-.07.61-.21l1.55-1.21L18.58 18H5.41l4.42-4.42 1.55 1.21ZM20 6v.51l-8 6.22-8-6.22V6zm0 3.04v7.54l-4.24-4.24zm-11.76 3.3L4 16.58V9.04zM20 18"></path>
                     </svg>
                  </label>
                  <input type="text" id="email" placeholder="Enter Email" required>
               </div>
               

               <div class="input-box">
                  <label for="password">
                     <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  fill="#ffffff" viewBox="0 0 24 24" >
                        <path d="M6 22h12c1.1 0 2-.9 2-2v-9c0-1.1-.9-2-2-2h-1V7c0-2.76-2.24-5-5-5S7 4.24 7 7v2H6c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2M9 7c0-1.65 1.35-3 3-3s3 1.35 3 3v2H9z"></path>
                     </svg>
                  </label>
               <input type="password" id="pwd" placeholder="Enter password" required>
               </div>
            </div>

            <div class="butt">
               <div class="button">
                  <button type="submit" class="sub">Get Started</button><br />
               </div>

               <div id="errorContainer"></div>

               <div class="button">
                  <button type="reset" class="cls">Clear</button>
               </div>
            </div>
            
             <div class="forget-link">
               <p>Forgot password?</p><a href="#">Click here</a>
            </div>

            <div class="social-icons">
               <div class="icons">
                  <span class="google">
                     <a>
                        <svg xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" width="24" height="24" viewBox="0 0 48 48">
                           <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"></path><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"></path><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"></path><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"></path>
                        </svg>
                     </a>
                  </span>
               </div>
                 
               <div class="icons">
                  <span class="facebook">
                     <a href="#">
                        <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  fill="#ffffff" viewBox="0 0 24 24" >
                           <path d="M12 2.06c-5.5 0-10 4.5-10 10 0 4.94 3.61 9.06 8.33 9.89l.06-.05h-.06v-7.06h-2.5v-2.78h2.5V9.84c0-2.5 1.61-3.89 3.89-3.89.72 0 1.5.11 2.22.22v2.56h-1.28c-1.22 0-1.5.61-1.5 1.39v1.94h2.67l-.44 2.78h-2.22v7.06h-.06l.06.05c4.72-.83 8.33-4.94 8.33-9.89 0-5.5-4.5-10-10-10"></path>
                        </svg>
                     </a>
                  </span>
               </div>
                     
            </div>
         </form>
       </div>

      <div class="pic"></div>
   </div>
   

</body>
</html>
